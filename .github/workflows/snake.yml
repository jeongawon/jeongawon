name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 1회 자동 실행
  workflow_dispatch:        # 수동 실행 버튼
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: jeongawon
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#2DD4BF&color_dots=#161B22,#2DD4BF,#5EEAD4,#5EEAD4,#E6EDF3

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
